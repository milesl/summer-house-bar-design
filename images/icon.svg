<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="64" fill="#141210"/>
  <!-- Bar top -->
  <rect x="56" y="88" width="400" height="28" rx="6" fill="#665a48" stroke="#8a7e65" stroke-width="2"/>
  <!-- Wave panels with staggered depths -->
  <rect x="80" y="120" width="28" height="260" rx="3" fill="#3d3527" stroke="#4a4030" stroke-width="1.5"/>
  <rect x="120" y="120" width="28" height="260" rx="3" fill="#4a3f30" stroke="#5a4e3a" stroke-width="1.5"/>
  <rect x="160" y="120" width="28" height="260" rx="3" fill="#554a38" stroke="#6a5e48" stroke-width="1.5"/>
  <rect x="200" y="120" width="28" height="260" rx="3" fill="#5e5240" stroke="#7a6e55" stroke-width="1.5"/>
  <rect x="240" y="120" width="28" height="260" rx="3" fill="#4a3f30" stroke="#5a4e3a" stroke-width="1.5"/>
  <rect x="280" y="120" width="28" height="260" rx="3" fill="#3d3527" stroke="#4a4030" stroke-width="1.5"/>
  <rect x="320" y="120" width="28" height="260" rx="3" fill="#4a3f30" stroke="#5a4e3a" stroke-width="1.5"/>
  <rect x="360" y="120" width="28" height="260" rx="3" fill="#5e5240" stroke="#7a6e55" stroke-width="1.5"/>
  <rect x="400" y="120" width="28" height="260" rx="3" fill="#554a38" stroke="#6a5e48" stroke-width="1.5"/>
  <!-- LED strip glow -->
  <defs>
    <linearGradient id="led" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ffcc66" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#ffcc66" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffcc66" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="80" y="140" width="348" height="240" fill="url(#led)" opacity="0.25"/>
  <rect x="80" y="380" width="348" height="5" rx="2" fill="#ffcc66" opacity="0.9"/>
  <!-- Label -->
  <text x="256" y="440" fill="#c9a96e" font-family="sans-serif" font-size="48" font-weight="700" text-anchor="middle" letter-spacing="6">BAR</text>
  <text x="256" y="468" fill="#8a7548" font-family="sans-serif" font-size="18" font-weight="400" text-anchor="middle" letter-spacing="4">PLAN</text>
</svg>
